apiVersion: apps/v1
kind: Deployment

metadata:
  name: audit-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: audit-service

  template:
    metadata:
      labels:
        app: audit-service

    spec:
      containers:
      - name: audit-service

        image: loan/audit-service:latest

        ports:
        - containerPort: 8089
