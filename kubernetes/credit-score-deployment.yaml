apiVersion: apps/v1
kind: Deployment

metadata:
  name: creditscore-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: creditscore-service

  template:
    metadata:
      labels:
        app: creditscore-service

    spec:
      containers:
      - name: creditscore-service

        image: loan/auth-service:latest

        ports:
        - containerPort: 8083
