apiVersion: apps/v1
kind: Deployment

metadata:
  name: loan-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: loan-service

  template:
    metadata:
      labels:
        app: loan-service

    spec:
      containers:
      - name: loan-service

        image: loan/loan-service:latest

        ports:
        - containerPort: 8086
