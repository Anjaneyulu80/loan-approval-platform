apiVersion: apps/v1
kind: Deployment

metadata:
  name: risk-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: risk-service

  template:
    metadata:
      labels:
        app: risk-service

    spec:
      containers:
      - name: risk-service

        image: loan/risk-service:latest

        ports:
        - containerPort: 8085
